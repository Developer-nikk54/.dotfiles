"$schema" = 'https://starship.rs/config-schema.json'


format = """
[¯éÂ](#626880)\
[´î¬ ](bg:#626880 fg:#89b4fa)\
[¯é┤](bg:#89b4fa fg:#626880)\
$directory\
[¯é┤](fg:#89b4fa bg:#394260)\
$git_branch\
$git_status\
[¯é┤](fg:#394260 bg:#212736)\
$nodejs\
$bun\
$rust\
$golang\
$php\
$docker_context\
[¯é┤](fg:#212736 bg:#1d2230)\
[¯é┤ ](fg:#1d2230)\
\n\n$character"""

[directory]
style = "fg:#2f2836 bg:#89b4fa"
format = "[ $path ]($style)"
truncation_length = 2
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "

[git_branch]
symbol = " ´Éÿ "
style = "bg:#394260"
format = '[[ ¯¬ä  $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[nodejs]
symbol = "¯£ÿ"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[bun]
symbol = "¯Ø»"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[rust]
symbol = "¯×¿"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[golang]
symbol = "¯ÿº"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[php]
symbol = "¯ÿê"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[c]
symbol = "¯ÿ×"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:#769ff0 bg:#212736)]($style)'

[docker_context]
symbol = "´îê"
style = "bg:surface0"
format = '[[ $symbol( $context) ](fg:#769ff0 bg:#212736)]($style)'

[character]
disabled = false

success_symbol = '[#ÔØ»](bold fg:green)'
error_symbol = '[#ÔØ»](bold fg:red)'
vimcmd_symbol = '[ÔØ«#](bold fg:red)'
vimcmd_replace_one_symbol = '[#ÔØ»](bold fg:green)'
